services:
  - type: web
    name: checkup-ai-reset-coach
    runtime: python
    repo: https://github.com/SCNULMH/healthcare.git
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    plan: free
    autoDeploy: true
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
      - key: PUBLIC_DATA_BASE_URL
        value: https://api.odcloud.kr/api
      - key: USE_DEMO_DATA
        value: "false"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: DATABASE_BACKEND
        value: firebase
      - key: DATABASE_PATH
        value: data/reset_coach.sqlite3
      - key: FIREBASE_CREDENTIALS_PATH
        value: ""
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: checkup-70a1e
      - key: FIREBASE_WEB_APP_ID
        value: 1:605150906055:web:6021dd1c404c7739cde0e2
      - key: RISK_MODEL_MODE
        value: auto
      - key: RISK_MODEL_PATH
        value: models/risk_models_3000.joblib
      - key: OCR_PROVIDER
        value: demo
      - key: OCR_FALLBACK_TO_DEMO
        value: "true"
      - key: OCR_MAX_UPLOAD_BYTES
        value: "8000000"
      - key: OCR_REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_OCR_MODEL
        value: gpt-4.1-mini
