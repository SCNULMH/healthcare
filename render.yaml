services:
  - type: web
    name: checkup-ai-reset-coach
    runtime: python
    repo: https://github.com/SCNULMH/healthcare.git
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    plan: free
    autoDeploy: true
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
      - key: PUBLIC_DATA_BASE_URL
        value: https://api.odcloud.kr/api
      - key: USE_DEMO_DATA
        value: "false"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: RISK_MODEL_MODE
        value: auto
      - key: RISK_MODEL_PATH
        value: models/risk_models.joblib
